# Parâmetros de tuning da FSM (controle_robo). Carregados em runtime via
# self._carregar_params(); os defaults de módulo no .py são o fallback.
# Ângulos em GRAUS (sufixo _deg) — convertidos p/ rad no código.
# Tune aqui sem reeditar código. Constantes estruturais (GOAL_FRACOES,
# FOOTPRINT_*) seguem no .py por não serem escalares simples.
controle_robo:
  ros__parameters:
    use_sim_time: true

    # --- Detecção / aproximação da bandeira ---
    flag_detec_min_ticks: 5 # ticks consecutivos detectando antes de navegar (~0.5s)
    flag_perda_max: 25 # ticks sem ver a flag (navegando) antes de re-explorar
    stop_dist: 0.30 # [m] parada do goal: ~alcance do braço (0.39) p/ não atropelar a haste
    setor_bandeira_deg: 8.0 # meia-largura do setor LIDAR em torno do bearing
    range_fallback: 2.5 # [m] distância assumida se o LIDAR não retornar
    nav_retry_max: 3 # reenvios de goal antes de desistir/re-explorar
    obstaculo_tol: 0.5 # [m] LIDAR < câmera por +isto => obstáculo no meio

    # --- Critérios p/ ENTRAR em POSICIONANDO_FINAL ---
    flag_area_min_px: 900 # [px] flag grande na imagem => perto
    flag_align_max_deg: 6.0 # |bearing| máx p/ "alinhado"
    flag_range_max: 1.0 # [m] range LIDAR p/ validar proximidade
    muito_perto_dist: 0.5 # [m] abaixo disto entra só pelo range (área falha)
    goal_refresh_ticks: 10 # re-mira/re-planeja o goal da flag a cada ~1 s (persistente)
    alcancou_marca_dist: 0.5 # [m] perto da marca da flag E sem ver a flag -> re-explora

    # --- Servo visual (aproximação final, sem Nav2) ---
    vs_dist: 0.9 # [m] raio de ativação da captura: abaixo disto para de recalcular e assume o servo visual
    vs_kp: 1.5 # ganho de giro [rad/s por rad de bearing]
    vs_max_w: 1.2 # [rad/s] giro máximo
    vs_vel: 0.30 # [m/s] avanço quando centrada (posiciona p/ pegar mais rápido)
    vs_align_deg: 12.0 # |bearing| p/ considerar centrada

    # --- Sequência de captura (ticks @ freq_controle) ---
    gripper_extend_ticks: 10
    gripper_close_ticks: 10
    gripper_lift_ticks: 10
    grab_dist: 0.41 # [m] fecha a garra (na_dist): >platô da haste (~0.36) p/ parar ANTES de empurrar
    creep_vel: 0.12 # [m/s] avanço final (posiciona p/ pegar mais rápido; na_dist para antes)
    creep_max_ticks: 20 # teto do avanço final (segurança)
    posic_manobras_max: 2 # ré+recentragens na fase 1 (braço fora) antes de re-aproximar do zero
    manobra_max_ticks: 30 # ticks (~3 s) máx recuando/centrando na manobra antes de re-aproximar
    grab_dist_tol: 0.05 # [m] banda em torno de grab_dist (dá ré se passar do ponto)
    grab_stall_eps: 0.01 # [m] progresso mín. de rng p/ não contar como "encostou"
    grab_stall_ticks: 6 # ticks alinhado sem aproximar (rng parou) = haste na palma -> fecha
    re_dist: 0.7 # [m] folga p/ estender/abrir o braço sem bater no pole (>0.4) - fallback maior
    vel_retorno: 1.5 # [m/s] velocidade na volta à base (caminho já conhecido)
    retorno_obstacle_scale: 1.0 # peso de obstáculo (DWB) na volta: desvia mais com a flag
    vel_re_retorno: 0.3 # [m/s] ré liberada no DWB na volta (reposiciona com o casco maior)
    retorno_refresh_ticks: 30 # re-envia o goal de volta a cada ~3 s (re-planeja contínuo)
    align_retorno_tol_deg: 10.0 # |erro de yaw| p/ considerar encarando a base (gira antes de voltar)
    giro_retorno_w: 1.0 # [rad/s] giro no lugar p/ encarar a base (moderado: casco grande c/ flag)
    giro_retorno_max_ticks: 60 # ticks (~6 s) p/ alinhar; estourou (sem espaço) -> volta de ré
    retorno_inflation_radius: 0.55 # [m] inflação MAIOR na volta (default costmap 0.27): confia no mapa
    retorno_cost_scaling: 2.5 # decaimento do custo na volta (default 4.0; menor = custo espalha mais)
    retorno_path_scale: 64.0 # DWB na volta: peso de SEGUIR o caminho (Path*); default exploração 32
    retorno_goal_scale: 10.0 # DWB na volta: peso de puxar p/ o goal (Goal*); baixo = não corta (default 24)
    retorno_sim_time: 1.2 # [s] DWB na volta: janela de sim menor p/ cortar menos (default 1.5)
    retorno_stall_ticks: 40 # ticks (~4 s) parado c/ goal pendente na volta -> nudge anti-travamento
    retorno_nudge_ticks: 15 # ticks (~1.5 s) de nudge manual (ré+giro) p/ destravar o DWB
    retorno_nudge_vel: 0.2 # [m/s] ré do nudge de destravamento
    retorno_nudge_w: 0.6 # [rad/s] giro do nudge (muda heading -> DWB re-planeja de outra pose)

    # --- Fallback: confirma a flag NA MÃO pela câmera após erguer (senão re-tenta) ---
    verif_area_min: 800 # [px] área mínima da flag na câmera p/ confirmar que está na mão
    verif_max_ticks: 15 # ticks (~1.5 s) esperando confirmar a flag na mão
    grab_attempts_max: 3 # re-grabs antes de seguir p/ a base assim mesmo (best effort)

    # --- Depósito da flag na plataforma de início (label 28, visão) ---
    deposit_standoff: 1.0 # [m] para a esta distância da origem (plataforma à frente)
    deposit_vel: 0.2 # [m/s] avanço lento centrando na plataforma
    deposit_max_ticks: 60 # ticks ~8 s máx (fallback) p/ subir na plataforma
    deposit_perda_ticks: 8 # ticks sem ver a plataforma (após vê-la) = está por cima
    deposit_drop_dist: 0.45 # [m] distância ao centro (origem) p/ baixar o braço e soltar

    # --- Encravado / busca de parede (recovery) ---
    stuck_min_move: 0.15 # [m] deslocamento mín. p/ "está se movendo"
    stuck_max_ticks: 30 # ticks quase parado em EXPLORANDO antes de avançar
    avanco_max_ticks: 60 # ticks indo p/ frente antes de voltar a explorar
    avanco_vel: 0.4 # [m/s] avanço à procura de parede
    avanco_front_sector_deg: 20.0 # meia-largura do setor frontal vigiado
    avanco_safe_dist: 0.5 # [m] obstáculo à frente mais perto que isto => gira
    avanco_giro: 0.6 # [rad/s] giro p/ o lado mais aberto

    # --- Laço de controle ---
    freq_controle: 10 # [Hz] taxa do laço da FSM
