# Nav2 – parâmetros para o prm_robot (diff drive).
# SEM amcl e SEM map_server: a localização (map -> odom) e o mapa (/map) vêm do
# slam_toolbox. Subir via nav2_bringup/navigation_launch.py.
#
# Robô: base 0.42 (x) x 0.31 (y) m, rodas separação 0.4 m, raio roda 0.10 m.
# LIDAR /scan 360°, range 0.12–3.5 m. Nav2 publica /cmd_vel (Twist) que é
# repassado ao diff_drive pelo relay_cmd_vel.

bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom_gt
    bt_loop_duration: 50
    default_server_timeout: 30
    # BT customizada SEM o recovery BackUp (sem ré). O caminho absoluto é
    # injetado em runtime pelo launch (RewrittenYaml) — este valor é placeholder.
    default_nav_to_pose_bt_xml: "OVERRIDDEN_AT_LAUNCH"
    # Lista padrão de nós de Behavior Tree do Nav2 Humble
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: progress_checker
    goal_checker_plugins: [general_goal_checker]
    controller_plugins: [FollowPath]

    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
    general_goal_checker:
      stateful: true
      plugin: nav2_controller::SimpleGoalChecker
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25

    # DWB – controlador local para diff drive
    FollowPath:
      plugin: dwb_core::DWBLocalPlanner
      debug_trajectory_details: true
      min_vel_x: 0.0 # SEM ré: pra mudar de direção, gira no lugar (rodas centradas)
      min_vel_y: 0.0
      max_vel_x: 1.0 # menos corte de curva a alta velocidade (raspava obstáculo)
      max_vel_y: 0.0
      max_vel_theta: 2.5 # giro mais rápido p/ virar 180° com facilidade
      min_speed_xy: 0.0
      max_speed_xy: 1.0
      min_speed_theta: 0.0
      acc_lim_x: 3.0 # acel/decel maiores p/ parar a tempo a 1.2 m/s
      acc_lim_y: 0.0
      acc_lim_theta: 4.0 # acel angular alta = entra/sai do giro rápido
      decel_lim_x: -3.0
      decel_lim_y: 0.0
      decel_lim_theta: -4.0
      vx_samples: 15
      vy_samples: 5
      vtheta_samples: 15 # amostragem angular mais fina p/ girar em corredor estreito
      sim_time: 1.5
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.3
      xy_goal_tolerance: 0.25
      trans_stopped_velocity: 0.25
      short_circuit_trajectory_evaluation: true
      stateful: true
      critics:
        [
          RotateToGoal,
          Oscillation,
          BaseObstacle,
          GoalAlign,
          PathAlign,
          PathDist,
          GoalDist,
        ]
      BaseObstacle.scale:
        0.15 # peso de obstáculo menor: aceita trajetórias
        # válidas que passam rente a obstáculos laterais
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05
      # footprint poligonal real (base 0.42 x 0.31 m) em vez de raio circular
      footprint: "[[0.23, 0.17], [0.23, -0.17], [-0.23, -0.17], [-0.23, 0.17]]"
      footprint_padding: 0.05 # margem de colisão menor: menos medo de obstáculo lateral
      plugins: [obstacle_layer, inflation_layer]
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan_filtered
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 5.0
          raytrace_min_range: 0.0
          obstacle_max_range: 4.0
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        # padding maior p/ não raspar; decaimento moderado ainda deixa lane entre
        # cilindros pro robô passar/girar.
        cost_scaling_factor: 5.0
        inflation_radius: 0.30
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      footprint: "[[0.23, 0.17], [0.23, -0.17], [-0.23, -0.17], [-0.23, 0.17]]"
      footprint_padding: 0.05 # margem de colisão menor: menos medo de obstáculo lateral
      resolution: 0.05
      track_unknown_space: true
      plugins: [static_layer, obstacle_layer, inflation_layer]
      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true
        subscribe_to_updates: true
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan_filtered
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 5.0
          raytrace_min_range: 0.0
          obstacle_max_range: 4.0
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        # padding maior p/ não raspar; decaimento moderado ainda deixa lane entre
        # cilindros pro robô passar/girar.
        cost_scaling_factor: 5.0
        inflation_radius: 0.30
      always_send_full_costmap: true

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 20.0
    planner_plugins: [GridBased]
    GridBased:
      plugin: nav2_navfn_planner/NavfnPlanner
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

smoother_server:
  ros__parameters:
    use_sim_time: true
    smoother_plugins: [simple_smoother]
    simple_smoother:
      plugin: nav2_smoother::SimpleSmoother
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

behavior_server:
  ros__parameters:
    use_sim_time: true
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    # 'backup' e 'spin' precisam existir como SERVER senão a BT default
    # navigate_through_poses (que referencia BackUp/Spin) falha ao carregar e o
    # bt_navigator não ativa. Na prática nenhum é usado: o robô só roda
    # navigate_to_pose, cuja BT custom (navigate_no_backup.xml) NÃO chama BackUp
    # nem Spin. nav_through_poses nunca é executada.
    behavior_plugins: [spin, backup, drive_on_heading, assisted_teleop, wait]
    spin:
      plugin: nav2_behaviors/Spin
    backup:
      plugin: nav2_behaviors/BackUp
    drive_on_heading:
      plugin: nav2_behaviors/DriveOnHeading
    wait:
      plugin: nav2_behaviors/Wait
    assisted_teleop:
      plugin: nav2_behaviors/AssistedTeleop
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 2.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 2.5

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: OPEN_LOOP
    max_velocity: [1.0, 0.0, 2.5]
    min_velocity: [0.0, 0.0, -2.5] # sem ré; giro livre nos 2 sentidos
    max_accel: [3.0, 0.0, 4.0]
    max_decel: [-3.0, 0.0, -4.0]
    odom_topic: /odom_gt
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
